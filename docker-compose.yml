version: "3.9"

services:
  mcp-gateway:
    build: .
    ports:
      - "3100:3100"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - LOG_LEVEL=info
      # Pass through backend env vars
      # - SERVICENOW_INSTANCE_URL=https://myco.service-now.com
      # - GITHUB_TOKEN=${GITHUB_TOKEN}
    restart: unless-stopped
