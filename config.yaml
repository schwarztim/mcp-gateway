# MCP Gateway sample configuration.
# For large ToolHive/MCPU fleets, use config.fleet.yaml instead.

gateway:
  port: 3100
  host: "127.0.0.1"
  name: "mcp-gateway"
  log_level: "info"
  tool_prefix: ""
  # schema default is now mux/blocking — explicit value preserves pre-hardening behavior; flip deliberately.
  tool_exposure: "namespaced"
  streamable_http_stateless: true
  streamable_http_json_response: true

fleet:
  enabled: true
  toolhive:
    docker_ps: true
    endpoint_probe: false
    probe_timeout_ms: 750
    auto_ingest: true

safety:
  # schema default is now mux/blocking — explicit value preserves pre-hardening behavior; flip deliberately.
  enforce: "advisory"

backends:
  # stdio transport is prohibited — it deadlocks under gateway management
  # (handshake hangs, zero tools exposed, consumers burn tokens retrying).
  # Re-front any stdio MCP server behind streamable-http and wire it as http:
  #
  # echo:
  #   transport: "http"
  #   url: "http://127.0.0.1:3000/mcp"
  #   namespace: "echo"
  #   enabled: false
  #   restart_policy: "on-failure"
  #   max_restarts: 3
  #   health_check_interval: 60

  example-http:
    transport: http
    url: "http://127.0.0.1:3001/mcp"
    namespace: "example_http"
    enabled: false
    restart_policy: "on-failure"
    max_restarts: 3
    reconnect_interval: 5
    health_check_interval: 60

  example-sse:
    transport: sse
    url: "http://127.0.0.1:3002/sse"
    namespace: "example_sse"
    enabled: false
    restart_policy: "on-failure"
    max_restarts: 3
    reconnect_interval: 5
    health_check_interval: 60
