# MCP Gateway — Production Configuration
# Aggregates all MCP backends behind a single SSE/HTTP endpoint.
# Backends using launch-secure.sh pull secrets from macOS Keychain at runtime.

gateway:
  port: 3100
  host: "0.0.0.0"
  name: "mcp-gateway"
  log_level: "info"

backends:

  # ─── Core Work MCPs ───────────────────────────────────────────────

  servicenow:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/servicenow-mcp/dist/index.js"]
    env:
      SERVICENOW_INSTANCE_URL: "https://qvcprod.service-now.com"
    namespace: "servicenow"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 5
    health_check_interval: 30

  ms365:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/ms365-mcp/dist/index.js"]
    namespace: "ms365"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 5
    health_check_interval: 30

  epm-timesheet:
    transport: stdio
    command: "bash"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/epm-timesheet-mcp/launch-secure.sh"]
    namespace: "epm"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 60

  atlassian:
    transport: stdio
    command: "bash"
    args: ["/Users/timothy.schwarz/.claude/plugins/atlassian-api-plugin/mcp-server/launch-secure.sh"]
