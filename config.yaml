# MCP Gateway sample configuration.
# For large ToolHive/MCPU fleets, use config.fleet.yaml instead.

gateway:
  port: 3100
  host: "127.0.0.1"
  name: "mcp-gateway"
  log_level: "info"
  tool_prefix: ""
  tool_exposure: "mux"

fleet:
  enabled: true
  toolhive:
    docker_ps: true
    endpoint_probe: false
    probe_timeout_ms: 750
    auto_ingest: false

backends:
  echo:
    transport: stdio
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-everything"]
    namespace: "echo"
    enabled: false
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 60

  example-http:
    transport: http
    url: "http://127.0.0.1:3001/mcp"
    namespace: "example_http"
    enabled: false
    restart_policy: "on-failure"
    max_restarts: 3
    reconnect_interval: 5
    health_check_interval: 60

  example-sse:
    transport: sse
    url: "http://127.0.0.1:3002/sse"
    namespace: "example_sse"
    enabled: false
    restart_policy: "on-failure"
    max_restarts: 3
    reconnect_interval: 5
    health_check_interval: 60
