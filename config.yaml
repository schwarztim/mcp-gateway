# MCP Gateway — Production Configuration
# Aggregates all MCP backends behind a single SSE/HTTP endpoint.
# Secrets use vault: references resolved from HashiCorp Vault at startup.
# Syntax: vault:mcp/<path>#<key>  →  resolves to secret/data/mcp/<path>

gateway:
  port: 3100
  host: "0.0.0.0"
  name: "mcp-gateway"
  log_level: "info"

backends:

  # ─── Core Work MCPs ───────────────────────────────────────────────

  servicenow:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/servicenow-mcp/dist/index.js"]
    env:
      SERVICENOW_INSTANCE_URL: "vault:mcp/servicenow#instance_url"
    namespace: "servicenow"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 5
    health_check_interval: 30

  ms365:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/ms365-mcp/dist/index.js"]
    namespace: "ms365"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 5
    health_check_interval: 30

  epm-timesheet:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/epm-timesheet-mcp/dist/index.js"]
    env:
      EPM_URL: "vault:mcp/epm-timesheet#url"
      EPM_USERNAME: "vault:mcp/epm-timesheet#username"
      EPM_DOMAIN: "vault:mcp/epm-timesheet#domain"
      EPM_PASSWORD: "vault:mcp/qvc-sso#password"
    namespace: "epm"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 60

  atlassian:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/.claude/plugins/atlassian-api-plugin/mcp-server/index.js"]
    env:
      JIRA_URL: "https://qurate.atlassian.net"
      JIRA_EMAIL: "vault:mcp/atlassian#email"
      JIRA_API_TOKEN: "vault:mcp/atlassian#api_token"
    namespace: "atlassian"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 30

  copilot-studio:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/copilot-studio-mcp/dist/index.js"]
    namespace: "copilot-studio"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 30

  # ─── Security MCPs ────────────────────────────────────────────────

  crowdstrike:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/crowdstrike-ralph-mcp/dist/index.js"]
    namespace: "crowdstrike"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 30

  trufflehog:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/trufflehog-mcp/dist/index.js"]
    namespace: "trufflehog"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 60

  venafi:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/venafi-mcp/dist/index.js"]
    env:
      VENAFI_BASE_URL: "vault:mcp/venafi#base_url"
    namespace: "venafi"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 60

  # ─── Infrastructure MCPs ──────────────────────────────────────────

  akamai:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/akamai-mcp-server/dist/index.js"]
    cwd: "/Users/timothy.schwarz/akamai-mcp-server"
    env:
      AKAMAI_HOST: "vault:mcp/akamai#host"
      AKAMAI_CLIENT_TOKEN: "vault:mcp/akamai#client_token"
      AKAMAI_CLIENT_SECRET: "vault:mcp/akamai#client_secret"
      AKAMAI_ACCESS_TOKEN: "vault:mcp/akamai#access_token"
      LOG_LEVEL: "info"
      AKAMAI_TOOL_MODE: "composite"
    namespace: "akamai"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 30

  tufin:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/tufin-mcp/dist/index.js"]
    namespace: "tufin"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 60

  # ─── DevOps MCPs ──────────────────────────────────────────────────

  confluence:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/confluence-knowledge-graph/mcp-server/dist/index.js"]
    env:
      CONFLUENCE_BASE_URL: "https://qurate.atlassian.net"
      CONFLUENCE_EMAIL: "vault:mcp/qvc-sso#email"
      CONFLUENCE_API_TOKEN: "vault:mcp/confluence#api_token"
      STORAGE_PATH: "/Users/timothy.schwarz/Scripts/confluence-knowledge-graph/storage"
    namespace: "confluence"
    enabled: false  # dist not built yet
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 60

  mcp-forge:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/mcp-forge/dist/mcp-server/index.js"]
    namespace: "forge"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 60

  thesun:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/thesun/dist/mcp-server/index.js"]
    namespace: "thesun"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 60

  # ─── IoT / Home MCPs ──────────────────────────────────────────────

  bambu-lab:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/bambu-lab-mcp/dist/index.js"]
    env:
      BAMBU_LAB_MQTT_HOST: "vault:mcp/bambu-lab#mqtt_host"
      BAMBU_LAB_MQTT_PASSWORD: "vault:mcp/bambu-lab#mqtt_password"
      BAMBU_LAB_DEVICE_ID: "vault:mcp/bambu-lab#device_id"
      AZURE_OPENAI_API_KEY: "vault:mcp/bambu-lab#azure_openai_api_key"
      AZURE_OPENAI_ENDPOINT: "https://openai-qrg-sandbox-experiment.cognitiveservices.azure.com"
      AZURE_OPENAI_DEPLOYMENT: "qrg-gpt-4.1-mini"
      AZURE_OPENAI_API_VERSION: "2025-01-01-preview"
    namespace: "bambu"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 60

  android:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/android-mcp/index.js"]
    namespace: "android"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    health_check_interval: 60

  # ─── Enhanced / Alternate MCPs ────────────────────────────────────

  ms365-enhanced:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/ms365-mcp-enhanced/dist/index.js"]
    namespace: "ms365e"
    enabled: false  # disabled by default — conflicts with ms365
    restart_policy: "on-failure"
    max_restarts: 3

  # ─── Test Backend ─────────────────────────────────────────────────

  echo:
    transport: stdio
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-everything"]
    namespace: "echo"
    enabled: false  # disable for production use
    restart_policy: "on-failure"
