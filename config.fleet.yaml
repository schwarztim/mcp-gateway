# MCP Gateway — ToolHive fleet configuration.
# All THV containers are auto-ingested from ~/.config/mcpu/config.generated.json
# which is populated with current ports from `thv list`.
# No hardcoded ports — they change on container restart.

gateway:
  port: 3100
  host: "127.0.0.1"
  name: "mcp-gateway"
  log_level: "info"
  tool_prefix: ""
  tool_exposure: "mux"  # schema default is now mux — matches pre-hardening effective value; no behavior change.
  streamable_http_stateless: true
  streamable_http_json_response: true

fleet:
  enabled: true
  toolhive:
    docker_ps: true
    endpoint_probe: false
    probe_timeout_ms: 750
    auto_ingest: true
    ingest_static_mcpu_config: true
    ingest_namespace_prefix: ""
    # Skip non-MCP and non-functional entries
    ingest_skip:
      - mcpu
      - inspector
      - hermes
      - ghost-os
      - open-swarm
      - atlassian
      - ms365
      - az-teams

backends:
  # Unified M365 MCP — 137 tools (Teams, Mail, Calendar, Planner, To-Do, OneDrive, Flow, Contacts)
  az-teams:
    transport: http
    url: "http://127.0.0.1:8365/mcp"
    namespace: "az_teams"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
    connect_timeout_ms: 30000

  # Copilot Studio — DISABLED 2026-05-28 per operator directive: NEVER stdio.
  # stdio backends deadlock under gateway management (the pipe handshake hangs),
  # fail on every connect, and waste tokens each time a client retries. The only
  # supported transport in this fleet is streamable-http. Re-enable ONLY after
  # this server is re-fronted behind http — wrap dist/index.js in a streamable
  # -http transport and point `url:` at it, matching the az-teams pattern above.
  #
  # copilot-studio:
  #   transport: stdio          <-- PROHIBITED: stdio deadlocks under gateway management
  #   command: "node"
  #   args: ["/home/user/Scripts/mcp-servers/copilot-studio-mcp/dist/index.js"]
  #   namespace: "copilot-studio"
  #   enabled: false
  #   restart_policy: "on-failure"
  #   max_restarts: 3

safety:
  enforce: "advisory"  # schema default is now blocking — explicit value preserves pre-hardening behavior; flip deliberately.
