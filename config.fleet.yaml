# MCP Gateway — ToolHive fleet configuration.
# All THV containers are auto-ingested from ~/.config/mcpu/config.generated.json
# which is populated with current ports from `thv list`.
# No hardcoded ports — they change on container restart.

gateway:
  port: 3100
  host: "127.0.0.1"
  name: "mcp-gateway"
  log_level: "info"
  tool_prefix: ""
  tool_exposure: "mux"
  streamable_http_stateless: true
  streamable_http_json_response: true

fleet:
  enabled: true
  toolhive:
    docker_ps: true
    endpoint_probe: false
    probe_timeout_ms: 750
    auto_ingest: true
    ingest_static_mcpu_config: true
    ingest_namespace_prefix: ""
    # Skip non-MCP and non-functional entries
    ingest_skip:
      - mcpu
      - inspector
      - hermes
      - ghost-os
      - open-swarm
      - atlassian
      - ms365

backends:
  # Copilot Studio runs as a local stdio server, not in THV
  copilot-studio:
    transport: stdio
    command: "node"
    args: ["/Users/timothy.schwarz/Scripts/mcp-servers/copilot-studio-mcp/dist/index.js"]
    namespace: "copilot-studio"
    enabled: true
    restart_policy: "on-failure"
    max_restarts: 3
